apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-dashboard

spec:
  replicas: 2

  selector:
    matchLabels:
      app: iot-dashboard

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: iot-dashboard

    spec:
      containers:
      - name: iot-dashboard
        image: iot-dashboard:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 80

        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
          requests:
            memory: "64Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: iot-service

spec:
  type: NodePort

  selector:
    app: iot-dashboard

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007