apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-dashboard
  template:
    metadata:
      labels:
        app: iot-dashboard
    spec:
      containers:
      - name: iot-dashboard
        image: iot-dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: iot-service
spec:
  type: NodePort
  selector:
    app: iot-dashboard
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007